# AstroCarto page factory 正式项目配置。
#
# 这个文件不是网站运行时配置，而是给 page factory / SEO skill
# 读取的当前业务项目上下文文档。
#
# 使用方式：
#   1. 让 skill 在分析关键词或创建内页前先读取本文件
#   2. 用它判断关键词是否符合产品、是否会和已有页面内耗、应该做哪种页面
#   3. build 页面时按 implementation 中的路径和现有代码模式落地
#
# 维护原则：
#   - 字段名、page_type 枚举值保持英文，便于智能体稳定解析
#   - 说明和值可以写中文
#   - 每次新增核心 SEO 页面后，更新 existing_content_notes / priority_gaps
#   - locales 必须和 `src/i18n/locale.ts` 保持一致

site:
  # 网站/产品名称
  name: "AstroCarto"

  # 线上域名，用于 sitemap、canonical、SEO 分析
  url: "https://astrocarto.org"

  # 默认语言
  default_locale: "en"

  # 当前项目支持的语言。必须和 `src/i18n/locale.ts` 保持一致
  locales:
    - "en"
    - "zh"
    - "pt"
    - "es"
    - "it"
    - "de"

  # 一句话产品定位。关键词是否适合，主要靠这里判断
  one_line_pitch: "AstroCarto is a free astrocartography and astrology chart platform that helps users calculate birth charts, planetary lines, relocation charts, relationship charts, and AI-assisted location guidance from birth data."

  # 目标用户。写得越具体，关键词判断越准
  target_users:
    - "People exploring where to live, travel, work, study, or build relationships through astrocartography"
    - "Astrology learners who need accessible explanations of birth charts, planetary lines, houses, aspects, and placements"
    - "Spiritual, self-discovery, and relocation-curious users comparing places through birth chart and location astrology"
    - "Astrology content readers searching for practical calculators, interpretations, and beginner-friendly guides"

  # 用户来到网站最核心想完成的任务
  core_use_cases:
    - "Calculate a free astrocartography map from birth date, birth time, birth place, and target locations"
    - "Understand Sun, Moon, Mercury, Venus, Mars, Jupiter, Saturn, Uranus, and other astrocartography line meanings"
    - "Generate natal chart, birth chart, rising sign, Venus sign, lunar nodes, Chiron, synastry, composite, transit, solar return, and relocation chart results"
    - "Compare places for love, career, home, creativity, growth, challenge, and life direction using astrology"
    - "Ask follow-up questions through AI chat or paid credit features after receiving chart results"

  # 页面最终希望用户做什么
  conversion_goals:
    - "Use the free astrocartography calculator"
    - "Generate a chart or placement calculation"
    - "Read a planetary line guide and continue into the calculator"
    - "Sign in to save history or continue AI chat"
    - "Buy credits for deeper AI interpretation or follow-up guidance"

seo:
  # 适合优先做内页的主题
  preferred_topics:
    - "Astrocartography calculator, astrocartography chart, and free astrocartography map topics"
    - "How to read astrocartography maps, planetary lines, ASC/DSC/MC/IC angles, and relocation astrology tutorials"
    - "Planetary line pages such as Uranus line, Neptune line, Pluto line, North Node line, Chiron line, and Lilith line when search intent is strong"
    - "Location astrology use cases: best places to live, love lines, career lines, travel lines, home/family lines, and challenging lines"
    - "Astrology calculators that fit the product: birth chart, natal chart, rising sign, Venus sign, Mars sign, lunar nodes, Chiron placement, transit chart, solar return, synastry, composite, and relocation chart"
    - "Beginner education hubs for astrology houses, planets, aspects, zodiac signs, chart reading, and placement meanings"
    - "Comparison or alternative pages only when they help users understand calculator differences or chart methods without making unsupported claims"

  # 明确不要做的主题方向
  forbidden_topics:
    - "Generic horoscope traffic with no connection to calculators, chart interpretation, relocation, or astrocartography"
    - "Medical, legal, financial, immigration, therapy, or safety advice presented as astrology certainty"
    - "Guaranteed outcomes such as guaranteed love, guaranteed money, guaranteed visa success, or guaranteed relocation success"
    - "Fear-based or fatalistic content that claims a line or placement is objectively dangerous, cursed, or unavoidable"
    - "Adult, gambling, illegal, occult harm, spell-casting, psychic scam, or manipulation-oriented topics"
    - "Pages that duplicate existing primary intents such as astrocartography calculator, astrocartography lines, Venus line, birth chart generator, or natal chart"
    - "Wplace, pixel art, color converter, or unrelated utility topics unless the project owner explicitly keeps them as a separate business line"

  # 竞品网站，可选。用于分析页面类型、搜索意图和内容差距
  competitors:
    - "https://www.astro.com"
    - "https://www.astro-seek.com"
    - "https://astro-charts.com"
    - "https://www.astrocartography.com"
    - "https://horoscopes.astro-seek.com"
    - "https://www.alabe.com"

  # 已有内容提醒：避免新页面和已有页面抢同一个关键词
  existing_content_notes: "Core existing SEO pages include `/`, `/astrocartography-calculator`, `/astrocartography-lines`, `/sun-line-astrocartography`, `/moon-line-astrocartography`, `/mercury-line-astrocartography`, `/venus-line-astrocartography`, `/mars-line-astrocartography`, `/jupiter-line-astrocartography`, `/saturn-line-astrocartography`, `/uranus-line-astrocartography`, `/tools/birth-chart-generator`, `/chart/natal-chart`, `/rising-sign-calculator`, `/venus-sign-calculator`, `/lunar-nodes-calculator`, `/chiron-placement-calculator`, `/relocation-chart-calculator`, `/solar-return-chart-calculator`, `/synastry-chart-calculator`, `/composite-chart-calculator`, and `/transit-chart-calculator`. Avoid creating near-duplicate pages for these exact intents. `/chart` and user/account pages are functional and should not be treated as SEO landing pages. `/color` and `/converter` are unrelated utility pages and should not guide future astrology SEO unless intentionally retained."

  # 当前比较值得继续评估的 SEO 缺口
  priority_gaps:
    - "how to read astrocartography map"
    - "astrocartography love lines"
    - "best places to live astrology"
    - "career lines astrocartography"
    - "neptune line astrocartography"
    - "pluto line astrocartography"
    - "north node line astrocartography"
    - "astrocartography chart interpretation"
    - "astrology houses guide"
    - "astrology aspects guide"
    - "mars sign calculator"

content_inventory:
  pages:
    - path: "/astrocartography-lines"
      primary_keyword: "astrocartography lines"
      secondary_keywords:
        - "astrocartography line meanings"
        - "planetary lines astrocartography"
        - "best astrocartography lines"
      page_type: "hub"
      locale: "en"
      topic_cluster: "astrocartography-lines"
      differentiation_notes: "Canonical directory and navigation center for all published planetary line guides."
    - path: "/pluto-line-astrocartography"
      primary_keyword: "pluto line astrocartography"
      secondary_keywords:
        - "pluto line meaning astrocartography"
        - "pluto MC line astrocartography"
        - "pluto ASC line astrocartography"
        - "pluto DSC line astrocartography"
        - "pluto IC line astrocartography"
      page_type: "blog"
      locale: "en"
      topic_cluster: "astrocartography-lines"
      differentiation_notes: "Canonical deep guide for Pluto line meanings, four angles, relocation effects, power dynamics, and practical limitations; the parent hub remains the directory and comparison surface."

page_strategy:
  # 允许智能体选择的页面类型。不要随便改这些英文枚举值
  allowed_page_types:
    - "tool"
    - "feature-landing"
    - "blog"
    - "docs"
    - "hub"
    - "comparison"
    - "glossary"

  # 默认 CTA 文案
  default_cta: "Calculate Your Free Chart"

  # 什么页面可以进主导航，什么页面只做内链
  nav_policy: "Only add pages to the main navigation when they are core calculators, major chart categories, astrocartography line hubs, or high-value learning hubs. Long-tail pages should use contextual internal links from related calculators, planetary line pages, blog posts, footer sections, or hub pages instead of crowding the header."

  # 什么情况下应该做博客，而不是工具页/落地页
  blog_policy: "Use blog for informational intent, chart reading tutorials, relocation examples, comparison explainers, and practical astrology guides. Use `tool` pages only when the user clearly expects an interactive calculator or chart output. Use `feature-landing` or `hub` pages when the keyword implies a durable SEO landing page with strong internal navigation."

  # 页面类型选择原则
  page_type_rules:
    tool: "Choose for calculator, generator, map, chart, or placement keywords where the page must accept user inputs and return a useful result."
    feature-landing: "Choose for commercial or product-fit keywords where the user wants a solution, not a long article."
    blog: "Choose for how-to, examples, interpretation, comparison, and exploratory informational intent."
    docs: "Choose for product help, API-like instructions, setup, or support content."
    hub: "Choose for broad clusters such as astrocartography lines, astrology houses, planets, aspects, or calculators."
    comparison: "Use carefully for method/tool comparisons; avoid unsupported competitor claims."
    glossary: "Use for concise definitions that can link into deeper calculators and guides."

  # 新页面默认参考哪个已有内页克隆结构（按项目真实路由更新）
  default_template_pages:
    tool: "/astrocartography-calculator"
    chart-tool: "/synastry-chart-calculator"
    placement-tool: "/chiron-placement-calculator"
    line-guide: "/venus-line-astrocartography"
    hub: "/astrocartography-lines"
    blog: "/posts/[slug]"
    pricing: "/pricing"
    docs: "/docs"
    comparison: ""
    glossary: ""

implementation:
  # 技术栈和关键路径。换项目时重点检查这里
  framework: "nextjs"
  package_manager: "pnpm"
  router: "app-router"
  i18n_library: "next-intl"
  ui_stack:
    - "React 19"
    - "Tailwind CSS"
    - "shadcn/radix-style components"
    - "lucide-react and react-icons"
    - "Leaflet for maps"
    - "astronomy-engine for chart calculations"

  locale_file: "src/i18n/locale.ts"
  routing_file: "src/i18n/routing.ts"
  navigation_file: "src/i18n/navigation.ts"
  messages_dir: "src/i18n/messages"
  page_content_dir: "src/i18n/pages"
  app_routes_dir: "src/app/[locale]"
  default_public_routes_dir: "src/app/[locale]/(default)"
  api_routes_dir: "src/app/api"
  sitemap_path: "public/sitemap.xml"
  robots_path: "public/robots.txt"

  important_modules:
    astro_calculator: "src/lib/astro-calculator.ts"
    natal_chart_core: "src/lib/natal-chart-core.ts"
    solar_return: "src/lib/solar-return.ts"
    placement_content: "src/lib/placement-page-content.ts"
    localized_placement_content: "src/lib/placement-page-localized-content.ts"
    page_service: "src/services/page.ts"
    pricing_service: "src/services/payment-selector.ts"
    entitlements_service: "src/services/entitlements.ts"

  route_patterns:
    public_page: "src/app/[locale]/(default)/<slug>/page.tsx"
    calculator_client: "src/app/[locale]/(default)/<slug>/<slug>-client.tsx"
    localized_content: "src/i18n/pages/<slug>/<locale>.json"
    api_calculator: "src/app/api/calculate-<feature>/route.ts"
    blog_list: "src/app/[locale]/(default)/posts/page.tsx"
    blog_detail: "src/app/[locale]/(default)/posts/[slug]/page.tsx"

  build_command: "pnpm build"
  dev_command: "pnpm dev"
  lint_command: "pnpm lint"
  cloudflare_build_command: "pnpm run cf:build"

localization:
  # 多语言时，是否要求先分析本地关键词，而不是直接翻译英文
  local_keyword_required: true

  # 如果某个语言市场搜索意图不匹配，是否跳过
  skip_weak_locale_intent: true

  # 各语言 slug 风格
  slug_style:
    en: "english-kebab-case"
    zh: "prefer short English product slug unless the project already uses a Chinese slug pattern"
    pt: "english slug is acceptable for product/calculator URLs; localized copy should be Portuguese"
    es: "english slug is acceptable for product/calculator URLs; localized copy should be Spanish"
    it: "english slug is acceptable for product/calculator URLs; localized copy should be Italian"
    de: "english slug is acceptable for product/calculator URLs; localized copy should be German"

  # 多语言扩展优先级（先英文，再按此顺序）
  locale_build_priority:
    - "en"
    - "zh"
    - "pt"
    - "es"
    - "it"
    - "de"

quality_gates:
  seo:
    - "Primary keyword must map to one distinct search job and must not duplicate an existing route."
    - "The page must include useful astrology-specific content, not generic keyword filler."
    - "Title, meta description, H1, intro, FAQ, and internal links must match the chosen page type."
    - "Medical, legal, financial, relationship, and relocation claims must be framed as reflective astrology guidance, not certainty."
    - "Update sitemap or the project's discovery surface when a public SEO page is added."

  product_fit:
    - "New pages should lead naturally toward the calculator, chart result, AI chat, or a related guide."
    - "Tool pages must provide a real interactive module or reuse/adapt an existing calculator honestly."
    - "Planetary line pages should cover meaning, angles, effects, relocation/travel use cases, FAQs, and links to the map calculator."

  implementation:
    - "Follow existing App Router, next-intl, JSON content, and component patterns."
    - "Avoid editing payment, auth, database, or unrelated utility pages unless the page requires it."
    - "Run available checks after implementation, normally `pnpm build`; use `pnpm lint` only if the project lint command is healthy."
